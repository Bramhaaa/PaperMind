services:
  db:
    image: pgvector/pgvector:pg16
    container_name: papermind-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: papermind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d papermind"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: papermind-backend
    restart: always
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/papermind
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - FERNET_KEY=gK-U6l9Q-30Vl_S17sZ0g7vS-a3fUfGZgK-U6l9Q-30= # default key for development
      - SERPER_API_KEY=${SERPER_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    volumes:
      - hf_cache:/root/.cache
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  hf_cache:
